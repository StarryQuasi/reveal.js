<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>物件導向程式設計</title>

    <link rel="stylesheet" href="dist/reset.css" />
    <link rel="stylesheet" href="dist/reveal.css" />
    <link rel="stylesheet" href="dist/theme/black.css" />

    <!-- Theme used for syntax highlighted code -->
    <link rel="stylesheet" href="dist/plugin/highlight/monokai.css" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        .rainbow-text {
            /* Create the rainbow gradient */
            background: linear-gradient(to right,
                    #ffafbd, #ffc3a0, #ffafbd, #ff6a88, #ff99ac, #ffafbd);

            /* Expand the background size so we have room to "slide" it */
            background-size: 200% auto;

            /* Clip the background to the text */
            -webkit-background-clip: text;
            background-clip: text;

            /* Make the actual text color transparent so the background shows through */
            color: transparent;

            /* Apply the animation */
            animation: rainbow-shift 3s linear infinite;
        }

        /* Define the sliding movement */
        @keyframes rainbow-shift {
            to {
                background-position: 200% center;
            }
        }

        .grass-text {
            /* A transition from bright grass green to dirt brown */
            background: linear-gradient(to bottom,
                    #5aa32a 0%,
                    /* Grass Green */
                    #79c043 25%,
                    /* Highlighted Green */
                    #674d3c 55%,
                    /* Darker Dirt */
                    #4e342e 100%
                    /* Deep Earth Brown */
                );

            /* Clipping magic */
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;

            /* Optional: Making it look blocky */
            font-weight: bold;
            text-transform: uppercase;
        }

        .grass-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <div class="reveal">
        <div class="slides">

                -->

            <section>
                <h3 class="fragment">OopMineGame<br>
                    2D 程序化生成沙盒遊戲</h3>

                <p class="fragment">課程：物件導向程式設計</p>
            </section>

                    <li>程昱銘：吃、睡、吃睡</li>
                </ul>

            <section>
                <ul>
                    <li><b>核心願景：</b>打造一個類似 <span class="grass-text">Minecraft</span> 的 2D 沙盒世界</li>
                    <li><b>技術目標：</b>

                        </ul>
                    </li>
                </ul>
            </section>
        </div>
    </div>

    <script src="dist/reveal.js"></script>
    <script src="dist/plugin/notes.js"></script>
    <script src="dist/plugin/markdown.js"></script>
    <script src="dist/plugin/highlight.js"></script>
    <script>
